<!DOCTYPE html>
<html lang="en"></html>

<head>
    <meta charset="UTF-8">
    <title>BreezeBooks - Contacts</title>
    <link rel="stylesheet" href="css/styles.css">
</head>



<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BreezeBooks - Contacts</title>


<link rel="stylesheet" href="styles.css">


</head>
<body>


<header>
    <h1>BreezeBooks</h1>

    <button id="logoutButton">
        Logout
    </button>
    
</header>

<main>

    
    <!-- search for contacts -->
    <section class="search-section">
        <h2>Search Contacts</h2>

        <input
            type="text"
            id="searchText"
            placeholder="Search by name, phone, or email">

        <button id="searchButton">
            Search
        </button>
    </section>

    <!-- add contact -->
    <section class="add-contact-section">
        <h2>Add Contact</h2>

        <div class="contact-form">

            <input
                type="text"
                id="firstName"
                placeholder="First Name">

            <input
                type="text"
                id="lastName"
                placeholder="Last Name">

            <input
                type="tel"
                id="phone"
                placeholder="Phone Number">

            <input
                type="email"
                id="email"
                placeholder="Email Address">

            <button id="addContactButton">
                Add Contact
            </button>

        </div>
    </section>

    <!-- displayed contact info -->
    <section class="contacts-section">

        <h2>Your Contacts</h2>

        <table id="contactsTable">

            <thead>
                <tr>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Edit</th>
                    <th>Delete</th>
                </tr>
            </thead>


            <tbody id="contactResults">

                <!-- sample contact/can delete later -->
                <tr>
                    <td>John</td>
                    <td>Smith</td>
                    <td>(555) 123-4567</td>
                    <td>john@email.com</td>

                    <td>
                        <button class="edit-btn">
                            Edit
                        </button>
                    </td>

                    <td>
                        <button class="delete-btn">
                            Delete
                        </button>
                    </td>
                </tr>

            </tbody>

        </table>


    </section>

</main>



</body>
</html>
